version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: my-mysql
    restart: always
    ports:
      - "4955:3306"
    environment:
      MYSQL_ROOT_PASSWORD: BeATiger
      MYSQL_DATABASE: todolist
      MYSQL_USER: tiger
      MYSQL_PASSWORD: agoodpassword
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: my-phpmyadmin
    restart: always
    depends_on:
      - mysql
    ports:
      - "8000:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

volumes:
  mysql_data:
  environment:
      MYSQL_ROOT_PASSWORD: BeATiger
      MYSQL_DATABASE: todolist
      MYSQL_USER: tiger
      MYSQL_PASSWORD: agoodpassword